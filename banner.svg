<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0077b5;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 52px; font-weight: 700; fill: #ffffff; letter-spacing: -1px; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 17px; font-weight: 400; fill: #a8d8f0; letter-spacing: 1px; }
      .dot { fill: #00d4ff; }
      .wave-path { fill: url(#wave1); }
      @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes moveWave { from { transform: translateX(0); } to { transform: translateX(-50%); } }
      .title { animation: fadeInDown 1s ease-out forwards; }
      .subtitle { animation: fadeInUp 1.2s ease-out forwards; }
      .dot1 { animation: pulse 2s infinite 0s; }
      .dot2 { animation: pulse 2s infinite 0.3s; }
      .dot3 { animation: pulse 2s infinite 0.6s; }
      .wave-anim { animation: moveWave 8s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="0"/>

  <!-- Animated wave shapes -->
  <g class="wave-anim">
    <ellipse cx="100" cy="180" rx="300" ry="60" fill="#00d4ff" opacity="0.05"/>
    <ellipse cx="500" cy="180" rx="300" ry="60" fill="#00d4ff" opacity="0.05"/>
    <ellipse cx="900" cy="180" rx="300" ry="60" fill="#00d4ff" opacity="0.05"/>
  </g>

  <!-- Decorative top line -->
  <rect x="0" y="0" width="900" height="3" fill="#00d4ff" opacity="0.6"/>

  <!-- Decorative bottom wave -->
  <path d="M0,160 Q225,130 450,155 Q675,180 900,150 L900,200 L0,200 Z" fill="#00d4ff" opacity="0.08"/>

  <!-- Accent dots -->
  <circle class="dot dot1" cx="60" cy="40" r="4" opacity="0.7"/>
  <circle class="dot dot2" cx="840" cy="40" r="4" opacity="0.7"/>
  <circle class="dot dot3" cx="450" cy="20" r="3" opacity="0.5"/>

  <!-- Small decorative lines -->
  <line x1="30" y1="100" x2="80" y2="100" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="820" y1="100" x2="870" y2="100" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Main Name -->
  <text class="title" x="450" y="105" text-anchor="middle" filter="url(#glow)">Akshay VP</text>

  <!-- Subtitle -->
  <text class="subtitle" x="450" y="145" text-anchor="middle">AI &amp; ML Engineer  ·  Data Scientist  ·  Analytics Enthusiast</text>

  <!-- Bottom accent line -->
  <rect x="0" y="197" width="900" height="3" fill="#00d4ff" opacity="0.4"/>
</svg>
